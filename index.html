<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Thank you</title>

<style>

/* ===== サイズ設定（ここだけ変えればOK） ===== */

:root{
    --card-width: 700px;
    --card-half-height: 400px;
}

/* ============================================ */

body{
    margin:0;
    background:#f4f4f4;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:var(--card-width);
    height:var(--card-half-height);
    position:relative;
    perspective:1200px;

    animation:expandCard 0.8s ease forwards;
    animation-delay:2s;
}

.base{
    position:absolute;
    top:var(--card-half-height);
    width:100%;
    height:var(--card-half-height);
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.cover{
    position:absolute;
    top:var(--card-half-height);
    width:100%;
    height:var(--card-half-height);
    background:white;

    transform-origin:top;
    animation:openCard 2s ease forwards;

    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.content{
    position:absolute;
    top:0;
    width:100%;
    height:calc(var(--card-half-height) * 2);
    padding:40px;
    box-sizing:border-box;
    text-align:center;

    opacity:0;
    animation:showContent 1s ease forwards;
    animation-delay:2.2s;
}

h1{
    margin-bottom:20px;
}

p{
    font-size:18px;
    line-height:1.8;
}

img{
    width:100%;
    margin-top:20px;
}

/* アニメーション */

@keyframes openCard{
    from{
        transform:rotateX(0deg);
    }
    to{
        transform:rotateX(180deg);
    }
}

@keyframes expandCard{
    from{
        height:var(--card-half-height);
    }
    to{
        height:calc(var(--card-half-height) * 2);
    }
}

@keyframes showContent{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="card">

<div class="cover"></div>

<div class="base"></div>

<div class="content">

<h1>２年間ありがとうございました！</h1>

<p>

３月でジョリパを卒業することになりました。<br><br>
ここで皆さんと一緒に働けたこと、
本当に感謝しています。<br><br>
いろんな方とたくさん話せて楽しかったし、多くを学ぶことが出来ました！<br><br>
いままで本当にありがとうございました。<br><br>
　　　　　　　ありぞのより
</p>

<img src="photo.jpg">

</div>

</div>

</body>
</html>
