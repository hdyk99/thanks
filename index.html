<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>Thank you</title>

<style>

body{
    margin:0;
    font-family: sans-serif;
    background-color:#f4f4f4;
}

.container{
    max-width:700px;
    margin:100px auto;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    font-size:36px;
    margin-bottom:30px;
    opacity:0;
    animation:fadeUp 1s ease forwards;
}

p{
    font-size:18px;
    line-height:1.8;
}

.thanks-image{
    width:100%;
    margin-top:30px;
    border-radius:10px;

    opacity:0;
    transform:translateY(20px);
    animation:fadeUp 1.5s ease forwards;
}

@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

<h1>ありがとうございました！</h1>

<p>
アルバイトを卒業することになりました。<br><br>

ここで皆さんと一緒に働けたこと、  
本当に感謝しています。<br><br>

至らない点も多かったと思いますが、  
支えていただきありがとうございました。<br><br>

この経験をこれからの人生に活かしていきます。<br><br>

本当にありがとうございました！
</p>

<img src="photo.jpg" class="thanks-image">

</div>

</body>
</html>
