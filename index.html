<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>ありがとうございました</title>

<style>

body{
    margin:0;
    font-family: "Hiragino Mincho ProN", serif;
    background:#f5f5f5;
    overflow:hidden;
}

/* 手紙 */

.letter{
    position:relative;
    max-width:500px;
    margin:80px auto;
    background:white;
    padding:40px;
    line-height:1.9;
    font-size:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    border-radius:6px;
    z-index:2;
}

.title{
    text-align:center;
    font-size:22px;
    margin-bottom:30px;
}

/* 桜 */

.sakura{
    position:fixed;
    top:-10px;
    font-size:18px;
    animation: fall linear infinite;
    z-index:1;
}

@keyframes fall{
    0%{
        transform:translateY(-10vh) rotate(0deg);
        opacity:1;
    }

    100%{
        transform:translateY(110vh) rotate(360deg);
        opacity:0.7;
    }
}

</style>
</head>

<body>

<div class="letter">

<div class="title">ジョリーパスタ福岡石丸店の皆さんへ</div>

2年間、本当にお世話になりました。<br><br>

楽しく働くことができ、ここで過ごした時間は  
自分にとって大切な思い出になりました。<br><br>

福岡で就職しますので、
また食べに遊びに来たいと思います。<br><br>

2年間、本当にありがとうございました。<br><br>

有薗より

</div>

<script>

function createSakura(){

    const sakura=document.createElement("div")
    sakura.classList.add("sakura")
    sakura.innerHTML="🌸"

    sakura.style.left=Math.random()*100+"vw"
    sakura.style.animationDuration=5+Math.random()*5+"s"
    sakura.style.fontSize=12+Math.random()*14+"px"

    document.body.appendChild(sakura)

    setTimeout(()=>{
        sakura.remove()
    },10000)

}

setInterval(createSakura,300)

</script>

</body>
</html>
