<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Thank you</title>

<style>

body{
    margin:0;
    background:#f4f4f4;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* 手紙全体 */
.letter{
    width:600px;
    perspective:1000px;
}

/* カード */
.card{
    width:100%;
    background:white;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transform-origin:top;
    transform:rotateX(-90deg);
    animation:openLetter 2s ease forwards;
}

/* 中身 */
.content{
    padding:40px;
    text-align:center;
}

h1{
    margin-bottom:30px;
}

p{
    line-height:1.8;
    font-size:18px;
}

img{
    width:100%;
    margin-top:30px;
    border-radius:10px;
}

/* 開くアニメーション */
@keyframes openLetter{
    0%{
        transform:rotateX(-90deg);
        opacity:0;
    }
    100%{
        transform:rotateX(0deg);
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="letter">
<div class="card">

<div class="content">

<h1>ありがとうございました！</h1>

<p>
アルバイトを卒業することになりました。<br><br>

ここで皆さんと一緒に働けたこと、  
本当に感謝しています。<br><br>

至らない点も多かったと思いますが、  
支えていただきありがとうございました。<br><br>

この経験をこれからの人生に活かしていきます。<br><br>

本当にありがとうございました！
</p>

<img src="photo.jpg">

</div>

</div>
</div>

</body>
</html>
