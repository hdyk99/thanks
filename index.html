<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you</title>

<style>

:root{
    --card-width:700px;
    --card-half-height:500px;
}

body{
    margin:0;
    background:#f4f4f4;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* カード */

.card{
    width:var(--card-width);
    height:var(--card-half-height);
    position:relative;
    perspective:1200px;
    cursor:pointer;
}

/* 封筒下 */

.base{
    position:absolute;
    top:var(--card-half-height);
    width:100%;
    height:var(--card-half-height);
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* 封筒フタ */

.cover{
    position:absolute;
    top:var(--card-half-height);
    width:100%;
    height:var(--card-half-height);
    background:white;
    transform-origin:top;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}


/* 手紙 */

.content{
    position:absolute;
    top:0;
    width:100%;
    height:calc(var(--card-half-height) * 2);
    padding:60px;
    box-sizing:border-box;
    opacity:0;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

p{
    font-size:18px;
    line-height:32px;
    text-align:left;
    padding-left:40px;

    background-image: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 31px,
        #dddddd 32px
    );
}

img{
    width:100%;
    margin-top:30px;
}

/* シール */

.seal{
    position:absolute;
    top:calc(var(--card-half-height) + 120px);
    left:50%;
    transform:translateX(-50%);

    width:70px;
    height:70px;

    background:#c0392b;
    border-radius:50%;

    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    z-index:5;
}

/* 宛名 */

.address{
    position:absolute;
    top:calc(var(--card-half-height) + 40px);
    width:100%;
    text-align:center;

    font-size:26px;
    letter-spacing:2px;
    color:#444;
}

/* Tap表示 */

.tap{
    position:absolute;
    top:calc(var(--card-half-height) + 200px);
    width:100%;
    text-align:center;
    font-size:22px;
    color:#666;

    animation:blink 1.5s infinite;
}

/* 開いた状態 */

.card.open{
    animation:expandCard 0.8s ease forwards;
}

.card.open .cover{
    animation:openCard 2s ease forwards;
}

.card.open .content{
    animation:showContent 1s ease forwards;
    animation-delay:2s;
}

.card.open .seal{
    animation:removeSeal 0.6s ease forwards;
}

.card.open .tap{
    display:none;
}

/* アニメーション */

@keyframes openCard{
    from{transform:rotateX(0deg);}
    to{transform:rotateX(180deg);}
}

@keyframes expandCard{
    from{height:var(--card-half-height);}
    to{height:calc(var(--card-half-height) * 2);}
}

@keyframes showContent{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes removeSeal{
    from{
        transform:translateX(-50%) scale(1);
        opacity:1;
    }
    to{
        transform:translateX(-50%) scale(0.3);
        opacity:0;
    }
}

@keyframes blink{
    0%{opacity:0.2;}
    50%{opacity:1;}
    100%{opacity:0.2;}
}

</style>
</head>

<body>

<div class="card" id="card">

<div class="seal"></div>

<div class="address">みんなへ</div>

<div class="tap">Tap to open</div>

<div class="cover"></div>

<div class="base"></div>

<div class="content">

<h1>２年間ありがとうございました！</h1>

<p>
３月でジョリパを卒業することになりました。<br><br>
ここで皆さんと一緒に働けたこと、
本当に感謝しています。<br><br>
いろんな方とたくさん話せて楽しかったし、多くを学ぶことが出来ました！<br><br>
いままで本当にありがとうございました。<br><br>
　　　　　　　　　　　　　　　　　　ありぞのより
</p>

<img src="photo.jpg">

</div>

</div>

<script>

const card = document.getElementById("card");

card.addEventListener("click", () => {
    card.classList.add("open");
});

</script>

</body>
</html>
